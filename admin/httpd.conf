# busybox httpd reads this file from the document root on each request.
# Without it, every unknown extension is served as application/octet-stream,
# which breaks ES module loading (browsers refuse), CSS application, and
# any client that distinguishes Content-Type.

# MIME type map: ".ext:mime/type" — one per line.
.html:text/html
.htm:text/html
.css:text/css
.js:application/javascript
.mjs:application/javascript
.json:application/json
.xml:application/xml
.txt:text/plain
.png:image/png
.jpg:image/jpeg
.jpeg:image/jpeg
.gif:image/gif
.svg:image/svg+xml
.ico:image/x-icon
.woff:font/woff
.woff2:font/woff2
